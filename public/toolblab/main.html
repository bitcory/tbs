<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOOLB LAB</title>
  <style>
    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-1Thin.ttf') format('truetype');
      font-weight: 100;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-2ExtraLight.ttf') format('truetype');
      font-weight: 200;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-3Light.ttf') format('truetype');
      font-weight: 300;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-4Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-5Medium.ttf') format('truetype');
      font-weight: 500;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-6SemiBold.ttf') format('truetype');
      font-weight: 600;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-7Bold.ttf') format('truetype');
      font-weight: 700;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-8ExtraBold.ttf') format('truetype');
      font-weight: 800;
      font-display: swap;
    }

    @font-face {
      font-family: 'Paperlogy';
      src: url('fonts/Paperlogy-9Black.ttf') format('truetype');
      font-weight: 900;
      font-display: swap;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      background: #f8fafc;
    }

    body {
      font-family: 'Paperlogy', sans-serif;
      color: #0f172a;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }

    /* ════════════════════════════
       HERO SECTION
    ════════════════════════════ */
    .hero {
      position: relative;
      padding: 56px 24px 110px;
      background: linear-gradient(135deg, #016837 0%, #00996D 45%, #00B380 100%);
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .hero::after {
      content: '';
      position: absolute;
      left: -10%;
      right: -10%;
      bottom: -1px;
      height: 70px;
      background: #f8fafc;
      border-radius: 50% 50% 0 0 / 100% 100% 0 0;
    }

    .hero-content {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      z-index: 2;
    }

    .hero-eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 8px 16px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      margin-bottom: 22px;
    }

    .hero-title {
      font-size: clamp(30px, 4.6vw, 54px);
      font-weight: 800;
      line-height: 1.2;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
    }

    .hero-subtitle {
      font-size: clamp(14px, 1.4vw, 18px);
      font-weight: 400;
      line-height: 1.7;
      opacity: 0.92;
      margin: 0 auto;
    }

    /* ════════════════════════════
       CARDS — HORIZONTAL SCROLL
    ════════════════════════════ */
    .cards-section {
      position: relative;
      margin-top: 8px;
      padding: 0 0 14px;
      z-index: 3;
    }

    .cards-track {
      display: flex;
      gap: 18px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      padding: 30px max(24px, calc(50% - 130px)) 30px;
      scrollbar-width: none;
    }

    .cards-track::-webkit-scrollbar {
      display: none;
    }

    .step-card {
      flex: 0 0 240px;
      scroll-snap-align: center;
      background: #fff;
      border-radius: 18px;
      padding: 36px 18px 20px;
      border: 2px solid transparent;
      box-shadow: 0 14px 36px rgba(15, 23, 42, 0.12);
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      position: relative;
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease, border-color 0.35s ease;
      transform-origin: center center;
    }

    .step-card:hover:not(.active) {
      transform: scale(1.03);
      box-shadow: 0 26px 56px rgba(0, 153, 109, 0.22);
    }

    .step-card.active {
      border-color: #00B380;
      box-shadow: 0 30px 70px rgba(0, 153, 109, 0.35), 0 0 0 3px rgba(0, 179, 128, 0.2);
      transform: scale(1.15);
      z-index: 10;
      animation: zoomPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes zoomPop {
      0% {
        transform: scale(0.85);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.2);
      }
      100% {
        transform: scale(1.15);
        opacity: 1;
      }
    }

    .step-card-check {
      position: absolute;
      top: 8px;
      right: 14px;
      width: 24px;
      height: 24px;
      border-radius: 7px;
      border: 2px solid #cbd5e1;
      background: #fff;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-card-check svg {
      width: 14px;
      height: 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .step-card.active .step-card-check {
      background: linear-gradient(135deg, #68D970, #00996D);
      border-color: #00996D;
    }

    .step-card.active .step-card-check svg {
      opacity: 1;
    }

    .step-card-visual {
      position: relative;
      width: 100%;
      aspect-ratio: 1.35;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-card-visual::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .step-card-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: relative;
      z-index: 1;
    }

    .step-card-number {
      position: relative;
      z-index: 1;
      font-size: 64px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      text-shadow: 0 4px 20px rgba(0, 0, 0, 0.18);
    }

    .visual-step1 {
      background: linear-gradient(135deg, #68D970, #00B380);
    }

    .visual-step2 {
      background: linear-gradient(135deg, #00B380, #016837);
    }

    .visual-step3 {
      background: linear-gradient(135deg, #00996D, #013D24);
    }

    .visual-step4 {
      background: linear-gradient(135deg, #1E293B, #00996D);
    }

    .visual-step5 {
      background: linear-gradient(135deg, #00B380, #68E571);
    }

    /* ZERO card visuals — clean opaque background, no noise overlay,
       so transparent PNG logos render crisply. */
    .visual-zero {
      background: #ffffff;
      border: 1px solid #e2e8f0;
    }

    .visual-zero::before {
      display: none;
    }

    .visual-zero img {
      object-fit: contain;
      padding: 14px;
    }

    /* Photo variant — full-bleed portrait thumbnails (no logo padding) */
    .visual-zero.visual-zero--photo {
      background: #0f172a;
      border: none;
    }

    .visual-zero.visual-zero--photo img {
      object-fit: cover;
      padding: 0;
    }

    .step-card-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #00996D;
      margin-bottom: 6px;
    }

    .step-card-title {
      font-size: 15px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.4;
    }

    .step-card-status {
      display: inline-block;
      margin-top: 10px;
      font-size: 11px;
      font-weight: 700;
      color: #94a3b8;
      padding: 3px 10px;
      border-radius: 100px;
      background: #f1f5f9;
    }

    /* ════════════════════════════
       CTA
    ════════════════════════════ */
    .cta-row {
      text-align: center;
      padding: 4px 24px 24px;
    }

    .cta-primary {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 17px 38px;
      background: linear-gradient(135deg, rgba(104,217,112,0.95) 0%, rgba(0,153,109,0.92) 100%);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.02em;
      border-radius: 100px;
      text-decoration: none;
      border: 1.5px solid rgba(0, 153, 109, 0.35);
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow:
        0 10px 28px rgba(0, 153, 109, 0.18),
        0 0 0 1px rgba(255, 255, 255, 0.6) inset,
        inset 2px 2px 1px 0 rgba(255, 255, 255, 0.85),
        inset -1px -1px 1px 1px rgba(255, 255, 255, 0.5);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2), box-shadow 0.3s ease, background 0.3s;
    }

    .cta-primary::before {
      content: '';
      position: absolute;
      inset: -12px -40px;
      z-index: -1;
      background: radial-gradient(ellipse at center, rgba(0, 179, 128, 0.35) 0%, rgba(0, 179, 128, 0) 70%);
      filter: blur(16px);
      pointer-events: none;
    }

    .cta-primary:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.03);
      background: rgba(255, 255, 255, 0.5);
      color: #00774f;
      box-shadow:
        0 18px 42px rgba(0, 153, 109, 0.3),
        inset 2px 2px 1px 0 rgba(255, 255, 255, 0.95),
        inset -1px -1px 1px 1px rgba(255, 255, 255, 0.6);
    }

    .cta-primary:active:not(:disabled) {
      transform: translateY(1px) scale(0.94);
      box-shadow:
        0 4px 10px rgba(0, 153, 109, 0.2),
        inset 2px 2px 2px 0 rgba(0, 0, 0, 0.08),
        inset -1px -1px 1px 1px rgba(255, 255, 255, 0.3);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
    }

    .cta-primary:disabled {
      background: rgba(203, 213, 225, 0.4);
      box-shadow: none;
      cursor: not-allowed;
      color: #94a3b8;
      border-color: rgba(255, 255, 255, 0.4);
    }

    .cta-primary:disabled::before { display: none; }

    .cta-watch {
      display: block;
      margin: 14px auto 0;
      background: none;
      border: none;
      color: #475569;
      font-size: 13px;
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 4px;
      cursor: pointer;
      font-family: inherit;
    }

    /* ════════════════════════════
       VIDEO PANEL
    ════════════════════════════ */
    .video-panel {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 24px 80px;
    }

    .video-panel-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
      padding-bottom: 18px;
      border-bottom: 1px solid #e2e8f0;
    }

    .video-panel-eyebrow {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
      background: linear-gradient(112.34deg, #68D970 -38.67%, #00996D 99.56%);
      padding: 6px 12px;
      border-radius: 100px;
    }

    .video-panel-title {
      font-size: clamp(20px, 2.4vw, 28px);
      font-weight: 800;
      color: #0f172a;
    }

    .video-section {
      margin-bottom: 36px;
    }

    .video-section:last-child {
      margin-bottom: 0;
    }

    .video-section-title {
      font-size: 15px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .video-section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: linear-gradient(180deg, #68D970, #00996D);
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .video-grid.single-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .video-slot {
      background: #0f172a;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16/9;
      position: relative;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    .video-grid.single-col .video-slot {
      aspect-ratio: auto;
      width: auto;
      max-width: 100%;
    }

    .video-grid.single-col .video-slot video {
      display: block;
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 80vh;
    }

    .video-slot video,
    .video-slot iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: 0;
    }

    .video-slot-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    }

    .video-slot-placeholder svg {
      width: 56px;
      height: 56px;
      opacity: 0.55;
    }

    .video-slot-placeholder span {
      letter-spacing: 0.04em;
    }

    /* ════════════════════════════
       RESPONSIVE
    ════════════════════════════ */
    @media (max-width: 900px) {
      .hero {
        padding: 36px 20px 90px;
      }

      .step-card {
        flex: 0 0 220px;
      }

      .cards-track {
        padding-left: max(20px, calc(50% - 120px));
        padding-right: max(20px, calc(50% - 120px));
      }
    }

    @media (max-width: 640px) {
      .step-card {
        flex: 0 0 65vw;
      }

      .cards-track {
        padding-left: 17vw;
        padding-right: 17vw;
        gap: 14px;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }

      .video-panel {
        padding: 20px 18px 60px;
      }
    }

    /* ════════════════════════════
       ACCESS CODE MODAL
    ════════════════════════════ */
    .access-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: modalFadeIn 0.2s ease;
    }

    .access-modal-overlay.active {
      display: flex;
    }

    @keyframes modalFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .access-modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px 28px;
      width: min(92vw, 380px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      animation: modalSlideUp 0.25s ease;
    }

    @keyframes modalSlideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .access-modal-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      color: #475569;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      font-family: inherit;
    }

    .access-modal-close:hover {
      background: #e2e8f0;
    }

    .access-modal-title {
      font-size: 20px;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 6px;
      text-align: center;
    }

    .access-modal-desc {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .access-modal-input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0.2em;
      color: #0F172A;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }

    .access-modal-input:focus {
      border-color: #00996D;
    }

    .access-modal-input.error {
      border-color: #ef4444;
      animation: shake 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .access-modal-error {
      font-size: 12px;
      color: #ef4444;
      text-align: center;
      margin-top: 8px;
      min-height: 16px;
      font-weight: 600;
    }

    .access-modal-submit {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: linear-gradient(112.34deg, #68D970 -38.67%, #00996D 99.56%);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s;
      font-family: inherit;
      letter-spacing: 0.02em;
    }

    .access-modal-submit:hover {
      opacity: 0.9;
    }

    /* ════════════════════════════
       SUB-SELECT MODAL
    ════════════════════════════ */
    .sub-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      animation: modalFadeIn 0.2s ease;
      padding: 20px;
    }
    .sub-modal-overlay.active { display: flex; }

    .sub-modal {
      background: #fff;
      border-radius: 24px;
      padding: 32px 28px 24px;
      width: min(94vw, 460px);
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.35);
      position: relative;
      animation: modalSlideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.4);
    }

    .sub-modal-close {
      position: absolute;
      top: 14px; right: 14px;
      width: 34px; height: 34px;
      border-radius: 50%;
      border: none;
      background: #f1f5f9;
      color: #475569;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit;
      transition: background 0.2s;
    }
    .sub-modal-close:hover { background: #e2e8f0; }

    .sub-modal-title {
      font-size: 20px;
      font-weight: 800;
      color: #0F172A;
      margin-bottom: 6px;
      text-align: center;
      padding-right: 30px;
    }

    .sub-modal-desc {
      font-size: 13px;
      color: #64748b;
      text-align: center;
      margin-bottom: 22px;
      line-height: 1.5;
    }

    .sub-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .sub-option {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 2.2), border-color 0.25s, box-shadow 0.25s, background 0.25s;
      font-family: inherit;
    }

    .sub-option-thumb {
      flex-shrink: 0;
      width: 80px;
      height: 80px;
      border-radius: 12px;
      overflow: hidden;
      background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
      box-shadow: 0 4px 10px rgba(15, 23, 42, 0.08);
    }
    .sub-option-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .sub-option:hover {
      border-color: #00B380;
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0, 153, 109, 0.12);
    }

    .sub-option.selected {
      border-color: #00B380;
      background: linear-gradient(135deg, rgba(104,217,112,0.08) 0%, rgba(0,153,109,0.1) 100%);
      box-shadow: 0 12px 28px rgba(0, 153, 109, 0.2), inset 0 0 0 1px rgba(0, 179, 128, 0.35);
    }

    .sub-option-body { flex: 1; min-width: 0; }

    .sub-option-title {
      font-size: 15px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 3px;
    }
    .sub-option-desc {
      font-size: 12px;
      color: #64748b;
      font-weight: 500;
    }

    .sub-option-check {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.25s;
    }
    .sub-option-check svg {
      width: 14px; height: 14px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .sub-option.selected .sub-option-check {
      background: linear-gradient(135deg, #68D970 0%, #00996D 100%);
      border-color: transparent;
    }
    .sub-option.selected .sub-option-check svg { opacity: 1; }

    .sub-modal-submit {
      width: 100%;
      padding: 15px 18px;
      background: rgba(255, 255, 255, 0.4);
      color: #00774f;
      font-size: 15px;
      font-weight: 800;
      border: 1.5px solid rgba(0, 153, 109, 0.35);
      border-radius: 14px;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.02em;
      backdrop-filter: blur(18px) saturate(180%);
      -webkit-backdrop-filter: blur(18px) saturate(180%);
      box-shadow:
        0 10px 28px rgba(0, 153, 109, 0.22),
        inset 2px 2px 1px 0 rgba(255, 255, 255, 0.85),
        inset -1px -1px 1px 1px rgba(255, 255, 255, 0.5);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2), box-shadow 0.3s, background 0.3s;
    }
    .sub-modal-submit:not(:disabled):hover {
      transform: translateY(-1px) scale(1.02);
      background: rgba(255, 255, 255, 0.55);
    }
    .sub-modal-submit:not(:disabled):active {
      transform: translateY(1px) scale(0.94);
      box-shadow:
        0 4px 10px rgba(0, 153, 109, 0.18),
        inset 2px 2px 2px 0 rgba(0, 0, 0, 0.08),
        inset -1px -1px 1px 1px rgba(255, 255, 255, 0.3);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
    }
    .sub-modal-submit:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      background: rgba(203, 213, 225, 0.3);
      color: #94a3b8;
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: none;
    }

    /* ════════════════════════════
       CLASS TABS
    ════════════════════════════ */
    .class-tabs {
      position: relative;
      z-index: 3;
      max-width: 720px;
      margin: -28px auto 0;
      padding: 0 20px;
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .class-tab {
      position: relative;
      flex: 1;
      max-width: 200px;
      padding: 14px 10px;
      border: 1px solid rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.55);
      color: #64748b;
      font-family: inherit;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 14px;
      cursor: pointer;
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      box-shadow:
        0 10px 28px rgba(15, 23, 42, 0.08),
        inset 1.5px 1.5px 0.5px 0 rgba(255, 255, 255, 0.85),
        inset -1px -1px 0.5px 1px rgba(255, 255, 255, 0.45);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 2.2), box-shadow 0.3s ease, color 0.25s, background 0.25s;
    }

    .class-tab:hover:not(.active) {
      transform: translateY(-2px) scale(1.03);
      color: #00996D;
      background: rgba(255, 255, 255, 0.75);
    }

    .class-tab:active:not(.active) {
      transform: translateY(1px) scale(0.94);
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.12);
      transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
    }

    .class-tab.active {
      background: linear-gradient(135deg, rgba(104,217,112,0.95) 0%, rgba(0,153,109,0.92) 100%);
      color: #fff;
      border-color: rgba(255, 255, 255, 0.45);
      box-shadow:
        0 16px 36px rgba(0, 153, 109, 0.35),
        inset 1.5px 1.5px 0.5px 0 rgba(255, 255, 255, 0.55),
        inset -1px -1px 0.5px 1px rgba(255, 255, 255, 0.25);
    }

    .class-view { display: none; }
    .class-view.active { display: block; }

    @media (max-width: 640px) {
      .class-tabs { gap: 6px; padding: 0 14px; }
      .class-tab { font-size: 11px; padding: 12px 6px; }
    }
  </style>
</head>

<body>

  <script>
    /* ──────────────── STEP DATA ──────────────── */
    const STEPS = {
      step1: {
        label: 'Step 1', title: '마스터 이미지 만들기', url: '/lecture/step1', ready: true,
      },
      step2: {
        label: 'Step 2', title: '영상 제작하기', ready: true,
        items: [
          { id: 'music', title: '뮤직 영상 만들기',   desc: '감성 뮤직 영상 스토리보드', thumb: '/images/thumbs/step2-1.jpg', url: '/lecture/step2' },
          { id: 'intro', title: '인트로 영상 만들기', desc: '브랜드 인트로 영상 제작',   thumb: '/images/thumbs/step3-1.jpg', url: '/lecture/step2-1' },
        ],
      },
      step3: {
        label: 'Step 3', title: '스토리 영상 만들기', url: '/lecture/step3', ready: true,
      },
      step4: { label: 'Step 3', title: '광고영상 제작',     url: '/lecture/step4', ready: true },
      step5: { label: 'Step 4', title: '유튜브 수익화과정', url: null, ready: false },

      'zero-gmail':    { label: 'Step 01', title: '구글계정 가입하기',   url: '/zero/gmail',    ready: true },
      'zero-flow':     { label: 'Step 02', title: 'FLOW 가입하기',        url: '/zero/flow',     ready: true },
      'zero-ai-photo': { label: 'Step 03', title: 'AI 사진 만들기',      url: '/zero/ai-photo', ready: true },
      'zero-ai-video': { label: 'Step 04', title: 'AI 영상 만들기',      url: '/zero/ai-video', ready: true },
      'zero-capcut':   { label: 'Step 05', title: '무료 캡컷 다운로드',  url: '/zero/capcut',   ready: true },
    };

    /* Per-step media for the panel below.
       Supported item types:
         - { type: 'image', src, alt }      → <img>
         - { type: 'video', src, poster? }  → <video controls>
         - { type: 'placeholder', label }   → empty slot with play icon */
    const STEP_MEDIA = {
      step1: [
        {
          title: '캐릭터 & 컨셉 시안',
          items: [
            { type: 'image', src: '/images/step1/character-sheet.png', alt: '캐릭터 시트' },
            { type: 'image', src: '/images/step1/sample-2.png',         alt: '컨셉 시안' },
          ],
        },
        {
          title: '마스터 이미지 & 작업물',
          items: [
            { type: 'image', src: '/images/step1/sample-1.png', alt: '작업물 샘플' },
            { type: 'image', src: '/images/step1/master.png',   alt: '마스터 이미지' },
          ],
        },
      ],
      step2: [
        {
          title: '뮤직 영상 미리보기',
          items: [
            { type: 'video', src: 'https://www.dropbox.com/scl/fi/yuu422j08cwsdb4f9dtbn/ED334F8B-B0CF-4A63-8B30-1B298765E6AC_video.MP4?rlkey=7qjv80w77a6qnhmmx2hxzyzxn&st=5m4j3mh2&raw=1', poster: '/images/thumbs/step2-1.jpg' },
            { type: 'video', src: 'https://www.dropbox.com/scl/fi/sprxx6bx1n1fax0osnpu0/.mp4?rlkey=bzvwjmb02j0v40i7ju90y3axd&st=pz8x7xn2&raw=1', poster: '/images/thumbs/step2-2.jpg' },
          ],
        },
        {
          title: '인트로 영상 미리보기',
          items: [
            { type: 'video', src: 'https://www.dropbox.com/scl/fi/zoxv7mrxgiykvycw98uzr/64FD93FB-9842-4116-A7CE-B6B6A26F6619_video.MP4?rlkey=4y5km1fa7slcw9vr8sdcqxsf5&st=wnlnkl49&raw=1', poster: '/images/thumbs/step3-1.jpg' },
            { type: 'video', src: 'https://www.dropbox.com/scl/fi/rgzsn6qqbz0cmwf0hhh8a/2.mp4?rlkey=cjpdtlfg0m05ta2v0hts68bov&st=n7oqdozj&raw=1', poster: '/images/thumbs/step3-2.jpg' },
          ],
        },
      ],
      step5: [
        {
          title: '영상 모아보기',
          layout: 'single',
          items: [
            { type: 'video', src: 'https://www.dropbox.com/scl/fi/eq6sqon5ew823djthwfsu/E3FD3A0C-CAAB-4AA1-A4A4-52CE3BDEC876_video.MP4?rlkey=y4yzfvrgzzc4y6d84zwgggb75&st=1me9wr60&raw=1', poster: '/images/thumbs/step5-1.jpg' },
          ],
        },
      ],
    };

    /* Default video panel layout for steps that don't have media yet */
    const DEFAULT_MEDIA = [
      { title: '이론 영상', items: [{ type: 'placeholder', label: '영상 1' }, { type: 'placeholder', label: '영상 2' }] },
      { title: '실습 영상', items: [{ type: 'placeholder', label: '영상 1' }, { type: 'placeholder', label: '영상 2' }] },
    ];

    let currentStep = 'step1';

    /* ──────────────── CLASS TABS ──────────────── */
    const CLASS_DEFAULT_STEP = { zero: 'zero-gmail', up: 'step1', pro: 'step4' };

    function selectClass(cls) {
      document.querySelectorAll('.class-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.class === cls);
      });
      document.querySelectorAll('.class-view').forEach(v => {
        v.classList.toggle('active', v.id === `view-${cls}`);
      });
      const defaultStep = CLASS_DEFAULT_STEP[cls];
      if (defaultStep && STEPS[defaultStep]) selectStep(defaultStep);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    /* ──────────────── CARD SELECTION ──────────────── */
    const selectedItems = {}; // { step2: 'music', ... }

    function selectStep(step, { userInitiated = false, skipCenter = false } = {}) {
      if (!STEPS[step]) return;
      const prevStep = currentStep;
      currentStep = step;

      document.querySelectorAll('.step-card').forEach(card => {
        card.classList.toggle('active', card.dataset.step === step);
      });

      const data = STEPS[step];
      document.getElementById('videoPanelEyebrow').textContent = data.label;
      document.getElementById('videoPanelTitle').textContent = data.title;

      updateCtaForStep(step);
      renderMediaPanel(step);
      if (!skipCenter) centerCardInTrack(step);

      // Auto-open sub-select modal on user-initiated click if step has items
      if (userInitiated && data.ready && Array.isArray(data.items) && data.items.length > 0) {
        openSubSelectModal(step);
      }
    }

    function detectCenterCard(track) {
      const cards = track.querySelectorAll('.step-card[data-step]');
      if (!cards.length) return null;
      const trackRect = track.getBoundingClientRect();
      const trackCenter = trackRect.left + trackRect.width / 2;
      let closest = null;
      let minDist = Infinity;
      cards.forEach(card => {
        const rect = card.getBoundingClientRect();
        const cardCenter = rect.left + rect.width / 2;
        const dist = Math.abs(cardCenter - trackCenter);
        if (dist < minDist) {
          minDist = dist;
          closest = card;
        }
      });
      return closest;
    }

    function updateCtaForStep(step) {
      const data = STEPS[step];
      const ctas = document.querySelectorAll('.cta-primary');
      ctas.forEach(cta => {
        if (!data.ready) {
          cta.disabled = true;
          cta.textContent = '준비중';
          return;
        }
        cta.disabled = false;
        if (Array.isArray(data.items) && data.items.length > 0) {
          const chosenId = selectedItems[step];
          const chosen = data.items.find(x => x.id === chosenId);
          cta.textContent = chosen ? `${chosen.title} 시작하기 →` : '과정 선택하기 →';
        } else {
          cta.textContent = '시작하기 →';
        }
      });
    }

    function renderMediaPanel(step) {
      const container = document.getElementById('videoSectionsContainer');
      if (!container) return;
      const sections = STEP_MEDIA[step] || DEFAULT_MEDIA;
      const placeholderSvg = `
        <svg viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5" />
          <path d="M10 8.5L15.5 12L10 15.5V8.5Z" fill="currentColor" />
        </svg>`;
      const renderItem = (item) => {
        if (item.type === 'image') {
          return `<img src="${item.src}" alt="${item.alt || ''}" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;" draggable="false" />`;
        }
        if (item.type === 'video') {
          const poster = item.poster ? ` poster="${item.poster}"` : '';
          return `<video src="${item.src}"${poster} controls preload="metadata" playsinline></video>`;
        }
        return `<div class="video-slot-placeholder">${placeholderSvg}<span>${item.label || ''}</span></div>`;
      };
      container.innerHTML = sections.map(section => {
        const gridClass = section.layout === 'single' ? 'video-grid single-col' : 'video-grid';
        return `
          <div class="video-section">
            <h3 class="video-section-title">${section.title}</h3>
            <div class="${gridClass}">
              ${section.items.map(item => `
                <div class="video-slot">${renderItem(item)}</div>
              `).join('')}
            </div>
          </div>`;
      }).join('');
    }

    function centerCardInTrack(step) {
      const card = document.querySelector(`.cards-track .step-card[data-step="${step}"]`);
      if (!card) return;
      const track = card.closest('.cards-track');
      if (!track) return;
      const trackRect = track.getBoundingClientRect();
      const cardRect = card.getBoundingClientRect();
      const delta = (cardRect.left + cardRect.width / 2) - (trackRect.left + trackRect.width / 2);
      track.scrollTo({ left: track.scrollLeft + delta, behavior: 'smooth' });
    }

    function startCurrentStep() {
      const data = STEPS[currentStep];
      if (!data || !data.ready) return;
      if (Array.isArray(data.items) && data.items.length > 0) {
        const chosenId = selectedItems[currentStep];
        const chosen = data.items.find(x => x.id === chosenId);
        if (chosen?.url) {
          navigateTop(chosen.url);
        } else {
          openSubSelectModal(currentStep);
        }
        return;
      }
      if (data.url) navigateTop(data.url);
    }

    /* ──────────────── SUB-SELECT MODAL ──────────────── */
    function openSubSelectModal(step) {
      const data = STEPS[step];
      if (!data || !data.items) return;
      const currentId = selectedItems[step];
      const container = document.getElementById('subOptions');
      container.innerHTML = data.items.map(item => `
        <button type="button" class="sub-option${currentId === item.id ? ' selected' : ''}" data-id="${item.id}" onclick="selectSubOption('${item.id}')">
          <div class="sub-option-thumb">
            ${item.thumb ? `<img src="${item.thumb}" alt="${item.title}" />` : ''}
          </div>
          <div class="sub-option-body">
            <div class="sub-option-title">${item.title}</div>
            ${item.desc ? `<div class="sub-option-desc">${item.desc}</div>` : ''}
          </div>
          <div class="sub-option-check">
            <svg viewBox="0 0 14 14" fill="none">
              <path d="M3 7.5L6 10.5L11 4.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
        </button>
      `).join('');

      document.getElementById('subModalTitle').textContent = `${data.label} · 세부 과정 선택`;
      document.getElementById('subModal').classList.add('active');
    }

    function selectSubOption(id) {
      selectedItems[currentStep] = id;
      document.querySelectorAll('.sub-option').forEach(b => {
        b.classList.toggle('selected', b.dataset.id === id);
      });
      updateCtaForStep(currentStep);
      // Auto-close shortly after selection for visual feedback
      setTimeout(closeSubModal, 220);
    }

    function closeSubModal() {
      document.getElementById('subModal').classList.remove('active');
    }

    function handleSubOverlayClick(e) {
      if (e.target.id === 'subModal') closeSubModal();
    }

    function scrollToVideos() {
      document.getElementById('videoPanel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function navigateTop(url) {
      if (window.top && window.top !== window.self) {
        window.top.location.href = url;
      } else {
        window.location.href = url;
      }
    }

    /* ──────────────── ACCESS CODE MODAL ──────────────── */
    let pendingStep = null;

    function openAccessModal(step) {
      pendingStep = step;
      const data = STEPS[step];
      const desc = document.getElementById('accessModalDesc');
      desc.innerHTML = `${data.label} 강의를 시작하려면<br />접속코드를 입력해주세요.`;

      const modal = document.getElementById('accessModal');
      modal.classList.add('active');
      const input = document.getElementById('accessCodeInput');
      input.value = '';
      clearError();
      setTimeout(() => input.focus(), 50);
    }

    function closeAccessModal() {
      document.getElementById('accessModal').classList.remove('active');
      pendingStep = null;
      clearError();
    }

    function handleOverlayClick(e) {
      if (e.target.id === 'accessModal') closeAccessModal();
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitAccessCode();
      } else if (e.key === 'Escape') {
        closeAccessModal();
      }
    }

    function clearError() {
      const input = document.getElementById('accessCodeInput');
      const error = document.getElementById('accessCodeError');
      input.classList.remove('error');
      error.textContent = '';
    }

    function showError(msg) {
      const input = document.getElementById('accessCodeInput');
      const error = document.getElementById('accessCodeError');
      input.classList.add('error');
      error.textContent = msg;
    }

    function submitAccessCode() {
      const input = document.getElementById('accessCodeInput');
      const value = input.value.trim();
      if (!value) {
        showError('접속코드를 입력해주세요.');
        return;
      }
      const data = STEPS[pendingStep];
      if (!data || !data.code || !data.url) {
        showError('알 수 없는 단계입니다.');
        return;
      }
      if (value === data.code) {
        navigateTop(data.url);
      } else {
        showError('접속코드가 올바르지 않습니다.');
      }
    }

    /* ──────────────── CARROUSEL NAVIGATION ──────────────── */
    function shiftStep(delta) {
      const activeView = document.querySelector('.class-view.active');
      if (!activeView) return;
      const stepsInView = Array.from(activeView.querySelectorAll('.step-card[data-step]'))
        .map(c => c.dataset.step);
      const idx = stepsInView.indexOf(currentStep);
      if (idx < 0) return;
      const next = stepsInView[Math.max(0, Math.min(stepsInView.length - 1, idx + delta))];
      if (next && next !== currentStep) selectStep(next);
    }

    /* ──────────────── INIT ──────────────── */
    function setupCardsTrack(track) {
      if (!track) return;

      let isDragging = false;
      let dragMoved = 0;
      let dragStartX = 0;
      let dragStartScrollLeft = 0;
      let dragCaptured = false;
      const DRAG_THRESHOLD = 6;

      // Click handlers scoped to this track (so dragMoved state is per-track)
      track.querySelectorAll('.step-card').forEach(card => {
        card.addEventListener('click', (e) => {
          if (dragMoved > DRAG_THRESHOLD) {
            e.preventDefault();
            e.stopPropagation();
            return;
          }
          if (card.dataset.step) {
            selectStep(card.dataset.step, { userInitiated: true });
          }
        });
      });

      const onPointerDown = (e) => {
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        isDragging = true;
        dragCaptured = false;
        dragMoved = 0;
        dragStartX = e.clientX;
        dragStartScrollLeft = track.scrollLeft;
      };

      const onPointerMove = (e) => {
        if (!isDragging) return;
        const dx = e.clientX - dragStartX;
        dragMoved = Math.max(dragMoved, Math.abs(dx));
        if (!dragCaptured && dragMoved > DRAG_THRESHOLD) {
          dragCaptured = true;
          track.style.cursor = 'grabbing';
          track.style.scrollSnapType = 'none';
          track.style.scrollBehavior = 'auto';
          try { track.setPointerCapture(e.pointerId); } catch (_) {}
        }
        if (dragCaptured) {
          track.scrollLeft = dragStartScrollLeft - dx;
        }
      };

      const onPointerUp = (e) => {
        if (!isDragging) return;
        isDragging = false;
        if (dragCaptured) {
          track.style.cursor = '';
          track.style.scrollBehavior = '';
          track.style.scrollSnapType = 'x mandatory';
          try { track.releasePointerCapture(e.pointerId); } catch (_) {}
        } else {
          const el = document.elementFromPoint(e.clientX, e.clientY);
          const card = el && el.closest && el.closest('.step-card');
          if (card && card.dataset.step) selectStep(card.dataset.step);
        }
        dragCaptured = false;
      };

      track.addEventListener('pointerdown', onPointerDown);
      track.addEventListener('pointermove', onPointerMove);
      track.addEventListener('pointerup', onPointerUp);
      track.addEventListener('pointercancel', onPointerUp);
      track.addEventListener('pointerleave', onPointerUp);

      // Sync active card to center of track after drag/wheel/trackpad/touch scroll.
      // Debounced so programmatic smooth-scroll doesn't cause loops.
      let scrollTimer = null;
      const syncActiveFromScroll = () => {
        const card = detectCenterCard(track);
        if (card && card.dataset.step && card.dataset.step !== currentStep) {
          selectStep(card.dataset.step, { skipCenter: true });
        }
      };
      track.addEventListener('scroll', () => {
        clearTimeout(scrollTimer);
        scrollTimer = setTimeout(syncActiveFromScroll, 120);
      }, { passive: true });

      track.querySelectorAll('img').forEach(img => {
        img.setAttribute('draggable', 'false');
      });
      track.style.cursor = 'grab';
      track.style.userSelect = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.cards-track').forEach(setupCardsTrack);
      selectStep('step1');

      // Keyboard arrows → navigate cards
      document.addEventListener('keydown', (e) => {
        // Ignore when modal is open or focus is on an input
        if (document.getElementById('accessModal').classList.contains('active')) return;
        const tag = (document.activeElement && document.activeElement.tagName) || '';
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;

        if (e.key === 'ArrowRight') {
          e.preventDefault();
          shiftStep(1);
        } else if (e.key === 'ArrowLeft') {
          e.preventDefault();
          shiftStep(-1);
        } else if (e.key === 'Enter' || e.key === ' ') {
          // Enter / Space → start the currently selected step
          const tag2 = (document.activeElement && document.activeElement.tagName) || '';
          if (tag2 !== 'BUTTON') {
            e.preventDefault();
            startCurrentStep();
          }
        }
      });
    });
  </script>

</body>
